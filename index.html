<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Time Lock</title>
    <style>
        body { 
            font-family: Arial; 
            background: #0d1117; 
            color: #fff; 
            text-align: center; 
            padding: 50px;
        }
        .box { 
            background: #161b22; 
            padding: 40px; 
            border-radius: 10px; 
            display: inline-block;
        }
        #timer { 
            font-size: 60px; 
            color: #f85149; 
            margin: 20px 0; 
        }
        .hidden { display: none; }
        button {
            background: #238636;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔒 Time Locked PDF</h1>
        
        <div id="lockedScreen">
            <h2 id="status">LOCKED</h2>
            <div id="timer">--:--:--</div>
            <p id="timeInfo"></p>
        </div>

        <div id="unlockedScreen" class="hidden">
            <h2 style="color:#2ea043">✅ UNLOCKED</h2>
            <a id="pdfBtn" href="#" target="_blank">
                <button>Open PDF</button>
            </a>
        </div>
    </div>

    <script>
        // ========================================
        // IDHA MATTUM MAATHU DA - 12 HOUR FORMAT
        // ========================================
        const PDF_FILE = "today.pdf";    // PDF name
        
        const OPEN_HOUR = 5;             // 1 to 12 mattum podu
        const OPEN_MIN = 26;             // 0 to 59
        const AM_OR_PM = "PM";           // "AM" or "PM" nu podu
        const OPEN_MINS = 5;             // Evlo nimisham open irukanum
        // ========================================

        // 12hr ah 24hr ku convert panrom - nee thoda venam
        let hour24 = OPEN_HOUR;
        if (AM_OR_PM === "PM" && OPEN_HOUR !== 12) {
            hour24 = OPEN_HOUR + 12;
        }
        if (AM_OR_PM === "AM" && OPEN_HOUR === 12) {
            hour24 = 0; // 12 AM = 0 hours
        }

        document.getElementById('pdfBtn').href = PDF_FILE;

        function updateClock() {
            const now = new Date();
            const startTime = new Date();
            startTime.setHours(hour24, OPEN_MIN, 0);
            
            const endTime = new Date(startTime);
            endTime.setMinutes(startTime.getMinutes() + OPEN_MINS);

            // Display ku 12hr format la kaaturom
            const timeStr = `${OPEN_HOUR}:${OPEN_MIN.toString().padStart(2,'0')} ${AM_OR_PM}`;
            const endHour12 = endTime.getHours() % 12 || 12;
            const endAMPM = endTime.getHours() >= 12 ? 'PM' : 'AM';
            const endTimeStr = `${endHour12}:${endTime.getMinutes().toString().padStart(2,'0')} ${endAMPM}`;
            document.getElementById('timeInfo').innerText = `Open Time: ${timeStr} to ${endTimeStr}`;

            if (now >= startTime && now <= endTime) {
                document.getElementById('lockedScreen').classList.add('hidden');
                document.getElementById('unlockedScreen').classList.remove('hidden');
            } else {
                document.getElementById('lockedScreen').classList.remove('hidden');
                document.getElementById('unlockedScreen').classList.add('hidden');
                
                if (now < startTime) {
                    const diff = startTime - now;
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    document.getElementById('timer').innerText = 
                        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                } else {
                    document.getElementById('status').innerText = "EXPIRED";
                    document.getElementById('timer').innerText = "CLOSED";
                }
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
