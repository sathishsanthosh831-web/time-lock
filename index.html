<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily PDF Unlock</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .box {
      background: white;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    h1 { color: #333; margin-bottom: 8px; font-size: 26px; }
    .date { color: #666; margin-bottom: 25px; font-size: 14px; }
    #timer {
      font-size: 34px;
      font-weight: bold;
      color: #d32f2f;
      margin: 25px 0;
      font-family: 'Courier New', monospace;
    }
    #timer.ready { color: #2e7d32; }
    button {
      padding: 16px 40px;
      font-size: 18px;
      font-weight: bold;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
    }
    button:hover:not(:disabled) { background: #1565c0; transform: scale(1.03); }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #msg { margin-top: 20px; color: #555; min-height: 22px; font-size: 14px; }
    .icon { font-size: 55px; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon" id="icon">🔒</div>
    <h1 id="pdfName">PDF Locked</h1>
    <div class="date" id="date">Loading...</div>
    <div id="timer">--:--:--</div>
    <button id="openBtn" disabled>Open PDF</button>
    <p id="msg">Time check panren...</p>
  </div>

  <script>
    // ===== DAILY INGA MATTUM MAATHU DA - 12 HOUR FORMAT ✅ =====
    const CONFIG = {
      HOUR: 11,           // 1 to 12 mattum podu
      MINUTE: 56,        // 0 to 59
      AM_PM: 'AM',       // 'AM' or 'PM' kuduthudu
      PDF_FILE: 'today.pdf', 
      PDF_TITLE: 'Daily Paper'
    };
    // ==========================================================

    const btn = document.getElementById('openBtn');
    const timerEl = document.getElementById('timer');
    const msgEl = document.getElementById('msg');
    const iconEl = document.getElementById('icon');
    const pdfNameEl = document.getElementById('pdfName');
    const dateEl = document.getElementById('date');

    // 12hr ah 24hr ku maatha function - code ku theva
    function to24Hour(h, ampm) {
      if (ampm === 'PM' && h !== 12) return h + 12;
      if (ampm === 'AM' && h === 12) return 0;
      return h;
    }

    const HOUR_24 = to24Hour(CONFIG.HOUR, CONFIG.AM_PM);
    const displayTime = `${CONFIG.HOUR}:${String(CONFIG.MINUTE).padStart(2,'0')} ${CONFIG.AM_PM}`;

    dateEl.innerText = new Date().toLocaleDateString('en-IN', { 
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
    });
    pdfNameEl.innerText = CONFIG.PDF_TITLE;

    function checkTime() {
      const now = new Date();
      const unlockTime = new Date();
      unlockTime.setHours(HOUR_24, CONFIG.MINUTE, 0, 0);
      
      if (now >= unlockTime) {
        timerEl.innerHTML = '✅ UNLOCKED';
        timerEl.classList.add('ready');
        btn.disabled = false;
        btn.innerText = `Open ${CONFIG.PDF_TITLE}`;
        msgEl.innerText = `Unlocked at ${displayTime}`;
        iconEl.innerText = '🔓';
        clearInterval(countdown);
      } else {
        const diff = unlockTime - now;
        const h = Math.floor(diff / 1000 / 60 / 60);
        const m = Math.floor(diff / 1000 / 60) % 60;
        const s = Math.floor(diff / 1000) % 60;
        
        timerEl.innerHTML = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        btn.disabled = true;
        btn.innerText = `Unlocks at ${displayTime}`;
        msgEl.innerText = `Innum ${h}h ${m}m ${s}s iruku da`;
      }
    }

    btn.onclick = () => {
      if (!btn.disabled) {
        window.open(CONFIG.PDF_FILE, '_blank');
      }
    }

    const countdown = setInterval(checkTime, 1000);
    checkTime();
    document.title = `${CONFIG.PDF_TITLE} - ${displayTime} Unlock`;
  </script>
</body>
</html>
