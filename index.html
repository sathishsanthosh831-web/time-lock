<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Lock PDF</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #0d1117; 
            color: #c9d1d9; 
            text-align: center; 
            padding: 20px;
        }
        .container { 
            max-width: 800px; 
            margin: auto; 
            background: #161b22; 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid #30363d;
        }
        .timer {
            font-size: 48px;
            font-weight: bold;
            color: #f78166;
            margin: 20px 0;
        }
        .hidden { display: none; }
        button {
            background: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Time Locked Document</h1>
        
        <!-- Ipo Enna Status nu Kaatum -->
        <div id="statusBox">
            <h2 id="statusText">Checking...</h2>
            <div class="timer" id="countdown"></div>
            <p id="openTimeText"></p>
        </div>

        <!-- Time Vanthaprom Idhu Open Aagum -->
        <div id="pdfBox" class="hidden">
            <h3>✅ Document Unlocked!</h3>
            <a id="pdfLink" href="#" target="_blank">
                <button>View / Download PDF</button>
            </a>
            <br><br>
            <iframe id="pdfFrame" src="" width="100%" height="600px"></iframe>
        </div>
    </div>

    <script>
        // ==============================================
        // ITHA MATTUM MAATHU DA - VERA EDHUM THODA VENAM
        // ==============================================
        const PDF_NAME = "today.pdf";  // Indha peru ah maathu. Ex: "new.pdf", "certificate2.pdf"
        
        const OPEN_TIME = {            // PDF open aaga vendiya time
            hour: 13,                  // 1 PM ku 13. 1 AM ku 1. 24hr format da
            minute: 30,                // 30 minutes
            duration: 5                // Evlo minute open la irukanum? 5 min nu vechiruken
        };
        // ==============================================

        const statusText = document.getElementById('statusText');
        const countdown = document.getElementById('countdown');
        const openTimeText = document.getElementById('openTimeText');
        const pdfBox = document.getElementById('pdfBox');
        const pdfLink = document.getElementById('pdfLink');
        const pdfFrame = document.getElementById('pdfFrame');

        // PDF link set panrom
        pdfLink.href = PDF_NAME;
        pdfFrame.src = PDF_NAME;

        function checkTime() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();

            // Open aagura time calculate panrom
            const openTime = new Date();
            openTime.setHours(OPEN_TIME.hour, OPEN_TIME.minute, 0, 0);

            // Close aagura time calculate panrom
            const closeTime = new Date(openTime);
            closeTime.setMinutes(openTime.getMinutes() + OPEN_TIME.duration);

            // Display ku time kaatura text
            const openTimeString = `${OPEN_TIME.hour.toString().padStart(2, '0')}:${OPEN_TIME.minute.toString().padStart(2, '0')}`;
            const closeTimeString = `${closeTime.getHours().toString().padStart(2, '0')}:${closeTime.getMinutes().toString().padStart(2, '0')}`;
            openTimeText.innerText = `Open Time: ${openTimeString} to ${closeTimeString}`;

            // Time check panrom
            if (now >= openTime && now <= closeTime) {
                // TIME VANTHUDUCHU - PDF KAATU
                statusText.innerText = "Document is OPEN now!";
                statusText.style.color = "#2ea043";
                countdown.innerText = "UNLOCKED";
                pdfBox.classList.remove('hidden');
            } else if (now < openTime) {
                // INNUM TIME VARALA - COUNTDOWN KAATU
                pdfBox.classList.add('hidden');
                statusText.innerText = "Document is LOCKED";
                statusText.style.color = "#f85149";

                // Countdown calculate panrom
                const diff = openTime - now;
                const hours = Math.floor(diff / 1000 / 60 / 60);
                const minutes = Math.floor(diff / 1000 / 60) % 60;
                const seconds = Math.floor(diff / 1000) % 60;
                countdown.innerText = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            } else {
                // TIME MUDINJIDUCHU
                pdfBox.classList.add('hidden');
                statusText.innerText = "Time Expired. Tomorrow try pannu da.";
                statusText.style.color = "#8b949e";
                countdown.innerText = "CLOSED";
            }
        }

        // 1 second ku oru thadava time check pannu
        setInterval(checkTime, 1000);
        checkTime(); // First time udane run pannu
    </script>
</body>
</html>
